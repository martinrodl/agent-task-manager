apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-task-manager
  namespace: agent-task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-task-manager
  template:
    metadata:
      labels:
        app: agent-task-manager
    spec:
      containers:
      - name: agent-task-manager
        image: localhost:32000/agent-task-manager:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agenttask-secrets
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: agenttask-secrets
              key: SECRET_KEY
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agenttask-secrets
              key: ADMIN_PASSWORD
        - name: AGENT_API_KEY
          valueFrom:
            secretKeyRef:
              name: agenttask-secrets
              key: AGENT_API_KEY
        - name: ORCHESTRATOR_API_KEY
          valueFrom:
            secretKeyRef:
              name: agenttask-secrets
              key: ORCHESTRATOR_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: agent-task-manager
  namespace: agent-task-manager
spec:
  selector:
    app: agent-task-manager
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
